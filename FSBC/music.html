<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Worship Music</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <h1>Worship Music</h1>

    <div class="content-box">
        <p>
            Recordings from our worship services. 
            We pray these songs bless and encourage you throughout the week.
        </p>
    </div>

    <div class="content-box">

        <h2>Playlist</h2>

        <!-- Audio Player -->
        <audio id="audioPlayer" controls style="width:100%; margin: 15px 0;"></audio>

        <!-- Song Buttons -->
        <div class="button-grid">

            <div class="button" onclick="playSong(0)">
                Good, Good Father
            </div>

  

        </div>

        <!-- Play All Button -->
        <div style="margin-top:20px;">
            <div class="button" onclick="playAll()">
                ▶ Play Full Playlist
            </div>
        </div>

    </div>

    <div style="text-align:center; margin-top:20px;">
    <a href="home.html" class="button">Back</a>
    </div>

</div>

<script>

const playlist = [
    "music/Good Good Father.mp3",
    "music/worship-030826.mp3",
    "music/worship-031526.mp3"
];

const player = document.getElementById("audioPlayer");
let currentTrack = 0;

function playSong(index) {
    currentTrack = index;
    player.src = playlist[currentTrack];
    player.play();
}

function playAll() {
    currentTrack = 0;
    player.src = playlist[currentTrack];
    player.play();
}

player.addEventListener("ended", function () {
    currentTrack++;
    if (currentTrack < playlist.length) {
        player.src = playlist[currentTrack];
        player.play();
    }
});

</script>

</body>
</html>
